<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4285f4">
  <title>タスク登録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 12px 32px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      padding: 22px 20px 24px;
      box-shadow: 0 4px 24px rgba(66,133,244,0.10);
    }

    /* ── ヘッダー ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.2px;
    }
    .cfg-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .cfg-btn:hover { opacity: 1; }

    /* ── 設定パネル ── */
    .cfg-panel {
      display: none;
      background: #f4f7fc;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1.5px solid #dde6f5;
    }
    .cfg-panel.open { display: block; }
    .cfg-label {
      font-size: 11px;
      font-weight: 700;
      color: #4285f4;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
      display: block;
    }
    .cfg-panel input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d0dced;
      border-radius: 10px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      color: #333;
      background: #fff;
      transition: border-color 0.2s;
    }
    .cfg-panel input[type="text"]:focus { border-color: #4285f4; }
    .cfg-hint {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
      line-height: 1.5;
    }
    .btn-save-cfg {
      width: 100%;
      padding: 10px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    .btn-save-cfg:hover { background: #3367d6; }

    /* ── ローディングセクション ── */
    #loadingSection {
      display: none;
      text-align: center;
      padding: 40px 0 20px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e4eaf4;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 14px;
      color: #888;
    }

    /* ── ログインセクション ── */
    #loginSection {
      display: none;
    }
    /* 初回ログインモード */
    #firstLoginMode {
      text-align: center;
      padding: 16px 0 8px;
    }
    .login-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    /* 再接続モード */
    #reconnectMode {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 8px;
      text-align: center;
    }
    .reconnect-icon {
      font-size: 44px;
      margin-bottom: 10px;
    }
    .reconnect-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .reconnect-desc {
      font-size: 13px;
      color: #888;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .btn-reconnect {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 10px rgba(66,133,244,0.30);
      width: 100%;
      justify-content: center;
    }
    .btn-reconnect:active { transform: scale(0.97); }
    .btn-reconnect:hover  { background: #3367d6; }

    .btn-login {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 10px rgba(66,133,244,0.30);
    }
    .btn-login:active { transform: scale(0.97); }
    .btn-login:hover { background: #3367d6; }
    .login-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 14px;
    }
    .btn-switch-login {
      background: none;
      border: none;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      margin-top: 16px;
      text-decoration: underline;
    }

    /* ── アプリ本体 ── */
    #appSection { display: none; }

    .task-input {
      width: 100%;
      font-size: 19px;
      padding: 14px 16px;
      border: 2px solid #e4eaf4;
      border-radius: 14px;
      outline: none;
      color: #1a1a2e;
      background: #fafcff;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .task-input:focus {
      border-color: #4285f4;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.12);
      background: #fff;
    }
    .task-input::placeholder { color: #b0bac8; }

    /* ── 日付セクション ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin: 18px 0 8px;
    }
    .date-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .btn-date {
      flex: 1;
      padding: 10px 8px;
      border: 2px solid #e4eaf4;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
    }
    .btn-date.active {
      background: #4285f4;
      border-color: #4285f4;
      color: #fff;
    }
    .btn-date:not(.active):active {
      background: #f0f4ff;
    }

    input[type="date"],
    input[type="time"] {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e4eaf4;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      color: #333;
      background: #fafcff;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="date"]:focus,
    input[type="time"]:focus { border-color: #4285f4; }

    /* ── 時間トグル ── */
    .time-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 6px;
      cursor: pointer;
    }
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-track {
      position: absolute;
      inset: 0;
      background: #cdd5e0;
      border-radius: 24px;
      transition: background 0.25s;
    }
    .switch-thumb {
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    .switch input:checked ~ .switch-track { background: #4285f4; }
    .switch input:checked ~ .switch-thumb { transform: translateX(18px); }
    .toggle-label { font-size: 14px; color: #444; }

    .time-wrap {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }
    .time-wrap.open { max-height: 60px; }
    .time-inner { padding-top: 2px; }

    /* ── 登録ボタン ── */
    .btn-register {
      width: 100%;
      padding: 16px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 22px;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 3px 12px rgba(66,133,244,0.25);
      letter-spacing: 0.3px;
    }
    .btn-register:hover { background: #3367d6; }
    .btn-register:active { transform: scale(0.98); }
    .btn-register:disabled {
      background: #b0bac8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── ステータス ── */
    .status {
      display: none;
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      animation: fadeIn 0.2s ease;
    }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error   { display: block; background: #ffebee; color: #c62828; }
    .status.info    { display: block; background: #e3f2fd; color: #1565c0; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ── モバイル用タップヒント（画面下部固定） ── */
    #mobileHint {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(238,242,247,1) 70%, rgba(238,242,247,0));
      z-index: 100;
    }
    .btn-tap-hint {
      width: 100%;
      padding: 22px;
      background: linear-gradient(135deg, #4285f4 0%, #34a0ea 100%);
      color: #fff;
      border: none;
      border-radius: 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(66,133,244,0.45);
      letter-spacing: 0.3px;
      animation: tapPulse 2s ease infinite;
    }
    @keyframes tapPulse {
      0%, 100% { box-shadow: 0 6px 24px rgba(66,133,244,0.45); transform: translateY(0); }
      50%       { box-shadow: 0 10px 32px rgba(66,133,244,0.60); transform: translateY(-3px); }
    }

    // ── ログアウトリンク ── */
    .logout-row {
      text-align: right;
      margin-bottom: 6px;
    }
    .btn-logout {
      background: none;
      border: none;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      padding: 2px 4px;
    }
    .btn-logout:hover { color: #e53935; text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">

  <!-- ヘッダー -->
  <div class="header">
    <h1>📝 タスク登録</h1>
    <button class="cfg-btn" id="cfgToggle" title="設定" onclick="toggleCfg()">⚙️</button>
  </div>

  <!-- 設定パネル（Client ID入力） -->
  <div class="cfg-panel" id="cfgPanel">
    <label class="cfg-label">Google OAuth Client ID</label>
    <input type="text" id="clientIdInput" placeholder="xxxxxxxxxx.apps.googleusercontent.com" autocomplete="off" />
    <p class="cfg-hint">
      Google Cloud Console → 認証情報 → OAuth 2.0 クライアント ID<br>
      で取得したClient IDをここに貼り付けてください
    </p>
    <button class="btn-save-cfg" onclick="saveConfig()">💾 保存してログイン</button>
  </div>

  <!-- ローディングセクション（サイレント認証待機中） -->
  <div id="loadingSection">
    <div class="loading-spinner"></div>
    <p class="loading-text">接続確認中…</p>
  </div>

  <!-- ログインセクション -->
  <div id="loginSection">

    <!-- 初回ログインモード -->
    <div id="firstLoginMode">
      <p class="login-desc">Googleアカウントでログインして<br>タスクを登録できるようにします</p>
      <button class="btn-login" onclick="handleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Googleでログイン
      </button>
      <p class="login-note">初回は ⚙️ からClient IDを設定してください</p>
    </div>

    <!-- 再接続モード（トークン期限切れ時） -->
    <div id="reconnectMode">
      <div class="reconnect-icon">🔐</div>
      <p class="reconnect-title">再接続が必要です</p>
      <p class="reconnect-desc">セッションの有効期限が切れました。<br>タップして再接続してください。</p>
      <button class="btn-reconnect" onclick="handleReconnect()">
        🔄 タップして再接続
      </button>
      <button class="btn-switch-login" onclick="showFirstLogin()">別のアカウントでログイン</button>
    </div>

  </div>

  <!-- アプリ本体 -->
  <div id="appSection">
    <!-- モバイル(Android)用：タップでキーボードを出す -->
    <div id="mobileHint">
      <button class="btn-tap-hint" onclick="startInput()">⌨️ タップして入力開始</button>
    </div>

    <div class="logout-row">
      <button class="btn-logout" onclick="handleLogout()">ログアウト</button>
    </div>

    <input
      type="text"
      class="task-input"
      id="taskInput"
      placeholder="タスクを入力..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="sentences"
      autofocus
    />

    <div class="section-label">📅 日付</div>
    <div class="date-btns">
      <button class="btn-date active" id="btnToday"    onclick="setDate('today')">今日</button>
      <button class="btn-date"        id="btnTomorrow" onclick="setDate('tomorrow')">明日</button>
    </div>
    <input type="date" id="datePicker" onchange="setDate('custom')" />

    <div class="time-toggle-row" onclick="toggleTime()">
      <label class="switch" onclick="event.stopPropagation()">
        <input type="checkbox" id="timeToggle" onchange="toggleTime()" />
        <span class="switch-track"></span>
        <span class="switch-thumb"></span>
      </label>
      <span class="toggle-label">⏰ 時間を指定する</span>
    </div>
    <div class="time-wrap" id="timeWrap">
      <div class="time-inner">
        <input type="time" id="timePicker" value="09:00" />
      </div>
    </div>

    <button class="btn-register" id="registerBtn" onclick="registerTask()">
      ✅ 登録する
    </button>
    <div class="status" id="statusMsg"></div>
  </div>

</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<script>
// ============================================================
//  定数・状態
// ============================================================
const TASKS_API = 'https://tasks.googleapis.com/tasks/v1';
const SCOPE     = 'https://www.googleapis.com/auth/tasks';

let accessToken      = null;
let tokenClient      = null;
let gisReady         = false;
let selectedDate     = 'today';
let silentRefreshPending = false;
let silentRefreshTimer   = null;
let refreshScheduleTimer = null;

// ============================================================
//  初期化
// ============================================================
window.addEventListener('load', () => {
  const savedId = localStorage.getItem('gtasks_client_id');
  if (savedId) document.getElementById('clientIdInput').value = savedId;

  const todayStr = toLocalDateStr(new Date());
  document.getElementById('datePicker').value = todayStr;
  document.getElementById('datePicker').min   = todayStr;

  // まずローディングを表示
  showLoading();
  waitForGIS();
});

function waitForGIS() {
  if (typeof google !== 'undefined' && google?.accounts?.oauth2) {
    gisReady = true;
    onGISReady();
  } else {
    setTimeout(waitForGIS, 150);
  }
}

function onGISReady() {
  const clientId = localStorage.getItem('gtasks_client_id');
  if (clientId) {
    buildTokenClient(clientId);
    tryAutoLogin();
  } else {
    // Client IDなし → ログイン画面（初回）
    showFirstLogin();
  }
}

// ============================================================
//  TokenClient の生成
// ============================================================
function buildTokenClient(clientId) {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPE,
    callback: onTokenReceived
  });
}

function onTokenReceived(resp) {
  // サイレントリフレッシュのタイマーをクリア
  if (silentRefreshPending) {
    clearTimeout(silentRefreshTimer);
    silentRefreshTimer   = null;
    silentRefreshPending = false;
  }

  if (resp.error) {
    // サイレント取得失敗（interaction_required 等）
    if (['access_denied','interaction_required','user_logged_out','immediate_failed'].includes(resp.error)) {
      // 再接続・ログインUIを表示（エラーメッセージは出さない）
      showReconnectOrLogin();
    } else {
      showStatus('ログインエラー: ' + resp.error, 'error');
      showReconnectOrLogin();
    }
    return;
  }

  // 成功
  accessToken = resp.access_token;
  const exp = Date.now() + (resp.expires_in - 60) * 1000;
  localStorage.setItem('gtasks_token',    accessToken);
  localStorage.setItem('gtasks_token_exp', String(exp));
  localStorage.setItem('gtasks_was_authed', '1'); // 認証済みフラグ

  // 55分後に自動サイレントリフレッシュをスケジュール
  scheduleTokenRefresh((resp.expires_in - 300) * 1000);

  showApp();
}

// ============================================================
//  自動ログイン（保存済みトークン検証 → サイレント更新）
// ============================================================
async function tryAutoLogin() {
  const token = localStorage.getItem('gtasks_token');
  const exp   = Number(localStorage.getItem('gtasks_token_exp') || 0);

  // トークンがまだ有効なら即座に使う
  if (token && Date.now() < exp) {
    try {
      const r = await fetch(`${TASKS_API}/users/@me/lists?maxResults=1`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (r.ok) {
        accessToken = token;
        // 残り期限に応じてリフレッシュをスケジュール
        const remaining = exp - Date.now();
        if (remaining > 300000) scheduleTokenRefresh(remaining - 300000);
        showApp();
        return;
      }
    } catch { /* ネット無し等はスキップ */ }
  }

  // トークン期限切れ or 無効 → ローディング表示のままサイレント更新を試みる
  if (tokenClient) {
    silentRefreshPending = true;
    // 5秒待っても応答なければ再接続UIを表示
    silentRefreshTimer = setTimeout(() => {
      if (silentRefreshPending) {
        silentRefreshPending = false;
        showReconnectOrLogin();
      }
    }, 5000);
    tokenClient.requestAccessToken({ prompt: '' });
  } else {
    showReconnectOrLogin();
  }
}

// ============================================================
//  先回りトークンリフレッシュ（期限切れを防ぐ）
// ============================================================
function scheduleTokenRefresh(delayMs) {
  if (refreshScheduleTimer) clearTimeout(refreshScheduleTimer);
  if (delayMs <= 0) return;
  refreshScheduleTimer = setTimeout(() => {
    if (accessToken && tokenClient) {
      tokenClient.requestAccessToken({ prompt: '' });
    }
  }, delayMs);
}

function clearToken() {
  accessToken = null;
  if (refreshScheduleTimer) { clearTimeout(refreshScheduleTimer); refreshScheduleTimer = null; }
  localStorage.removeItem('gtasks_token');
  localStorage.removeItem('gtasks_token_exp');
}

// ============================================================
//  画面切り替え
// ============================================================
function showLoading() {
  document.getElementById('loadingSection').style.display = 'block';
  document.getElementById('loginSection').style.display   = 'none';
  document.getElementById('appSection').style.display     = 'none';
  document.getElementById('mobileHint').style.display     = 'none';
}

function showFirstLogin() {
  document.getElementById('loadingSection').style.display   = 'none';
  document.getElementById('loginSection').style.display     = 'block';
  document.getElementById('appSection').style.display       = 'none';
  document.getElementById('firstLoginMode').style.display   = 'block';
  document.getElementById('reconnectMode').style.display    = 'none';
  document.getElementById('mobileHint').style.display       = 'none';
}

function showReconnectOrLogin() {
  document.getElementById('loadingSection').style.display = 'none';
  document.getElementById('loginSection').style.display   = 'block';
  document.getElementById('appSection').style.display     = 'none';
  document.getElementById('mobileHint').style.display     = 'none';

  const wasAuthed = localStorage.getItem('gtasks_was_authed');
  const clientId  = localStorage.getItem('gtasks_client_id');

  if (wasAuthed && clientId) {
    // 再接続モード（シンプルなタップ1回で再接続）
    document.getElementById('reconnectMode').style.display  = 'flex';
    document.getElementById('firstLoginMode').style.display = 'none';
  } else {
    // 初回ログインモード
    document.getElementById('reconnectMode').style.display  = 'none';
    document.getElementById('firstLoginMode').style.display = 'block';
  }
}

function showApp() {
  document.getElementById('loadingSection').style.display = 'none';
  document.getElementById('loginSection').style.display   = 'none';
  document.getElementById('appSection').style.display     = 'block';

  if (isMobile()) {
    document.getElementById('mobileHint').style.display = 'block';
    document.getElementById('taskInput').style.display  = 'none';
  } else {
    setTimeout(() => document.getElementById('taskInput').focus(), 120);
  }
}

// ============================================================
//  設定パネル
// ============================================================
function toggleCfg() {
  document.getElementById('cfgPanel').classList.toggle('open');
}

function saveConfig() {
  const id = document.getElementById('clientIdInput').value.trim();
  if (!id) { alert('Client IDを入力してください'); return; }
  localStorage.setItem('gtasks_client_id', id);
  if (gisReady) buildTokenClient(id);
  document.getElementById('cfgPanel').classList.remove('open');
  handleLogin();
}

// ============================================================
//  ログイン / 再接続 / ログアウト
// ============================================================
function handleLogin() {
  const id = localStorage.getItem('gtasks_client_id');
  if (!id) {
    document.getElementById('cfgPanel').classList.add('open');
    showStatus('⚙️ まずClient IDを設定してください', 'info');
    return;
  }
  if (!tokenClient) {
    if (!gisReady) { showStatus('Google認証ライブラリ読み込み中…', 'info'); return; }
    buildTokenClient(id);
  }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function handleReconnect() {
  // 再接続：同意画面なしでアカウント選択のみ
  if (!tokenClient) {
    const id = localStorage.getItem('gtasks_client_id');
    if (id && gisReady) buildTokenClient(id);
  }
  if (tokenClient) {
    showLoading();
    silentRefreshPending = true;
    silentRefreshTimer = setTimeout(() => {
      if (silentRefreshPending) {
        silentRefreshPending = false;
        // サイレント失敗 → select_account で試みる
        if (tokenClient) tokenClient.requestAccessToken({ prompt: 'select_account' });
      }
    }, 4000);
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

function handleLogout() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  clearToken();
  localStorage.removeItem('gtasks_was_authed');
  document.getElementById('taskInput').value = '';
  showFirstLogin();
}

// ============================================================
//  モバイル判定 / タップ入力
// ============================================================
function isMobile() {
  return 'ontouchstart' in window && navigator.maxTouchPoints > 0;
}

function startInput() {
  document.getElementById('mobileHint').style.display = 'none';
  document.getElementById('taskInput').style.display  = '';
  document.getElementById('taskInput').focus();
}

// ============================================================
//  日付ヘルパー
// ============================================================
function toLocalDateStr(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function setDate(mode) {
  const today    = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);

  document.getElementById('btnToday').classList.remove('active');
  document.getElementById('btnTomorrow').classList.remove('active');

  if (mode === 'today') {
    selectedDate = 'today';
    document.getElementById('btnToday').classList.add('active');
    document.getElementById('datePicker').value = toLocalDateStr(today);
  } else if (mode === 'tomorrow') {
    selectedDate = 'tomorrow';
    document.getElementById('btnTomorrow').classList.add('active');
    document.getElementById('datePicker').value = toLocalDateStr(tomorrow);
  } else {
    selectedDate = 'custom';
    const val = document.getElementById('datePicker').value;
    if (val === toLocalDateStr(today))    document.getElementById('btnToday').classList.add('active');
    if (val === toLocalDateStr(tomorrow)) document.getElementById('btnTomorrow').classList.add('active');
  }
}

// ============================================================
//  時間トグル
// ============================================================
function toggleTime() {
  const on = document.getElementById('timeToggle').checked;
  document.getElementById('timeWrap').classList.toggle('open', on);
}

// ============================================================
//  タスク登録
// ============================================================
async function registerTask() {
  const title = document.getElementById('taskInput').value.trim();
  if (!title) {
    showStatus('❌ タスク名を入力してください', 'error');
    document.getElementById('taskInput').focus();
    return;
  }
  if (!accessToken) {
    showStatus('❌ ログインしてください', 'error');
    return;
  }

  const btn = document.getElementById('registerBtn');
  btn.disabled    = true;
  btn.textContent = '⏳ 登録中…';

  const dateVal = document.getElementById('datePicker').value;
  const timeOn  = document.getElementById('timeToggle').checked;
  const timeVal = document.getElementById('timePicker').value;

  let due;
  if (timeOn && timeVal) {
    due = new Date(`${dateVal}T${timeVal}:00`).toISOString();
  } else {
    due = `${dateVal}T00:00:00.000Z`;
  }

  try {
    const res = await fetch(`${TASKS_API}/lists/@default/tasks`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({ title, due })
    });

    if (res.status === 401) {
      clearToken();
      showStatus('⚠️ セッション期限切れ。再接続してください', 'error');
      setTimeout(() => showReconnectOrLogin(), 1800);
      return;
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const today    = toLocalDateStr(new Date());
    const tomorrow = toLocalDateStr(new Date(Date.now() + 86400000));
    const label    = dateVal === today ? '今日' : dateVal === tomorrow ? '明日' : dateVal;
    const timeLabel = timeOn && timeVal ? ` ${timeVal}` : '（終日）';
    showStatus(`✅ 登録しました！ ${label}${timeLabel}`, 'success');

    document.getElementById('taskInput').value    = '';
    document.getElementById('timeToggle').checked = false;
    document.getElementById('timeWrap').classList.remove('open');
    setDate('today');

    if (isMobile()) {
      document.getElementById('taskInput').style.display  = 'none';
      document.getElementById('mobileHint').style.display = 'block';
    } else {
      document.getElementById('taskInput').focus();
    }

  } catch (e) {
    showStatus('❌ 登録失敗: ' + e.message, 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = '✅ 登録する';
  }
}

// ============================================================
//  ステータス表示
// ============================================================
let statusTimer = null;
function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className   = `status ${type}`;
  if (statusTimer) clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { el.className = 'status'; }, 3500);
}

// ============================================================
//  キーボード：Enter で登録
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'taskInput') {
    registerTask();
  }
});
</script>
